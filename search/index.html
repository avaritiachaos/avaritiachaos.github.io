<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aplayer@1.10.1/dist/APlayer.min.css">

<div id="bgm-player-container"></div>


<div class="bgm-prompt" id="bgm-prompt" style="display:none;">
  🎵 开启氛围音乐
</div>

<script src="https://cdn.jsdelivr.net/npm/aplayer@1.10.1/dist/APlayer.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
  'use strict';

  var STORAGE_KEY = 'jabberwocky-bgm';
  var ap = null;

  
  var defaultBGM = {
    name: '久遠寺有珠',
    url: '/久遠寺有珠.flac',
    artist: '深澤秀行',
    cover: 'https://cdn.jsdelivr.net/gh/avaritiachaos/shark-img/SVWC-7853~55_28.png'
  };

  
  var pageBGMEl = document.getElementById('page-bgm-data');
  var currentBGM = defaultBGM;
  if (pageBGMEl) {
    try {
      var pageBGM = JSON.parse(pageBGMEl.textContent);
      if (pageBGM && pageBGM.url) {
        currentBGM = {
          name: pageBGM.name || '未知曲目',
          url: pageBGM.url,
          artist: pageBGM.artist || '未知',
          cover: pageBGM.cover || defaultBGM.cover
        };
      }
    } catch(e) {   }
  }

  
  function getSavedState() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
    catch(e) { return {}; }
  }

  function saveState() {
    if (!ap || !ap.audio) return;
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        currentTime: ap.audio.currentTime || 0,
        volume: ap.audio.volume,
        paused: ap.audio.paused,
        userInteracted: true
      }));
    } catch(e) {}
  }

  
  try {
    var containerEl = document.getElementById('bgm-player-container');
    ap = new APlayer({
      container: containerEl,
      fixed: true,
      mini: true,
      autoplay: false,
      loop: 'one',
      theme: '#8a76aa',
      audio: [currentBGM]
    });
    
    containerEl._aplayer = ap;
  } catch(e) {
    console.warn('APlayer init failed:', e);
    return;
  }

  
  (function setupDiscRotation() {
    var styleEl = document.createElement('style');
    styleEl.textContent = '@keyframes aplayer-disc-spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}';
    document.head.appendChild(styleEl);

    var discEl = null;

    function setup() {
      var pic = document.querySelector('.aplayer .aplayer-pic');
      if (!pic || discEl) return;

      
      pic.style.borderRadius = '50%';
      pic.style.overflow = 'hidden';
      pic.style.position = 'relative';

      
      discEl = document.createElement('div');
      discEl.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;border-radius:50%;background-size:cover;background-position:center;animation:aplayer-disc-spin 20s linear infinite;animation-play-state:paused;z-index:0;';
      
      discEl.style.backgroundImage = pic.style.backgroundImage;
      pic.insertBefore(discEl, pic.firstChild);

      
      pic.style.backgroundImage = 'none';

      
      var btns = pic.querySelectorAll('.aplayer-button');
      for (var i = 0; i < btns.length; i++) {
        btns[i].style.zIndex = '2';
      }
    }

    setTimeout(setup, 800);

    ap.on('play', function() {
      if (!discEl) setup();
      if (discEl) discEl.style.animationPlayState = 'running';
    });
    ap.on('pause', function() {
      if (discEl) discEl.style.animationPlayState = 'paused';
    });
    
    ap.on('listswitch', function() {
      setTimeout(function() {
        if (discEl) {
          var pic = document.querySelector('.aplayer .aplayer-pic');
          if (pic) {
            discEl.style.backgroundImage = pic.style.backgroundImage || discEl.style.backgroundImage;
            pic.style.backgroundImage = 'none';
          }
        }
      }, 300);
    });
  })();

  
  ap.on('play', saveState);
  ap.on('pause', saveState);
  var lastSave = 0;
  ap.on('timeupdate', function() {
    var now = Date.now();
    if (now - lastSave > 5000) { lastSave = now; saveState(); }
  });

  
  var saved = getSavedState();
  if (saved.volume !== undefined) {
    ap.volume(saved.volume, true);
  }
  if (saved.currentTime && saved.currentTime > 0) {
    var onCanPlay = function() {
      ap.seek(saved.currentTime);
      ap.audio.removeEventListener('canplay', onCanPlay);
    };
    ap.audio.addEventListener('canplay', onCanPlay);
  }

  
  var prompt = document.getElementById('bgm-prompt');

  function startBGM() {
    if (!ap) return;
    ap.play();
    if (prompt) {
      prompt.classList.add('hidden');
      setTimeout(function() { prompt.style.display = 'none'; }, 500);
    }
  }

  if (prompt) {
    prompt.addEventListener('click', startBGM);
  }

  if (!saved.userInteracted) {
    
    if (prompt) prompt.style.display = 'block';
  } else if (saved.paused === false) {
    
    try {
      var playPromise = ap.play();
      if (playPromise && typeof playPromise.catch === 'function') {
        playPromise.catch(function() {
          if (prompt) prompt.style.display = 'block';
        });
      }
    } catch(e) {
      if (prompt) prompt.style.display = 'block';
    }
  }

  
  window.addEventListener('beforeunload', saveState);
  window.addEventListener('visibilitychange', function() {
    if (document.visibilityState === 'hidden') saveState();
  });
});
</script>


<script>
(function () {
  if (window.__avatarSpinBound) return;
  window.__avatarSpinBound = true;

  function spinAvatar(avatar) {
    avatar.classList.remove('is-spinning');
    void avatar.offsetWidth;
    avatar.classList.add('is-spinning');
  }

  document.addEventListener('click', function (event) {
    var avatar = event.target.closest && event.target.closest('.site-avatar');
    if (!avatar) return;

    event.preventDefault();
    event.stopPropagation();
    if (event.stopImmediatePropagation) event.stopImmediatePropagation();

    spinAvatar(avatar);
  }, true);

  document.addEventListener('animationend', function (event) {
    if (event.animationName !== 'avatar-spin-once') return;

    var avatar = event.target.closest && event.target.closest('.site-avatar');
    if (avatar) avatar.classList.remove('is-spinning');
  });
})();
</script>
